name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.5.0 or latest)'
        required: false
        default: 'latest'
        type: string
      push_to_registry:
        description: 'Push to GitHub Container Registry'
        required: false
        default: true
        type: boolean
      platforms:
        description: 'Platforms to build (comma-separated)'
        required: false
        default: 'linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      if: github.event_name != 'pull_request' && inputs.push_to_registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Download EasyTier binaries
      run: |
        set -e
        
        # 创建 build 目录
        mkdir -p build
        
        # 复制 Dockerfile 和 scripts 到 build 目录
        cp Dockerfile build/
        cp -r scripts/ build/scripts/
        
        cd build
        
        # 获取最新版本号
        LATEST_RELEASE=$(curl -s https://api.github.com/repos/EasyTier/EasyTier/releases/latest | grep '"tag_name":' | head -1 | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')
        echo "=== Downloading EasyTier $LATEST_RELEASE ==="
        
        # 定义架构映射
        declare -A ARCH_MAP=(
          ["x86_64"]="easytier-linux-x86_64"
          ["aarch64"]="easytier-linux-aarch64"
          ["armv7hf"]="easytier-linux-armv7hf"
          ["armhf"]="easytier-linux-armhf"
          ["riscv64"]="easytier-linux-riscv64"
        )
        
        # 下载并解压每个架构
        for ARCH_DIR in "${!ARCH_MAP[@]}"; do
          ARCHIVE_BASE="${ARCH_MAP[$ARCH_DIR]}"
          ARCHIVE_NAME="${ARCHIVE_BASE}-${LATEST_RELEASE}"
          URL="https://github.com/EasyTier/EasyTier/releases/download/$LATEST_RELEASE/${ARCHIVE_NAME}.zip"
          
          echo ""
          echo "=== Processing $ARCH_DIR ==="
          echo "Archive: $ARCHIVE_NAME"
          
          # 创建临时目录
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR"
          
          # 下载并解压
          echo "Downloading..."
          if ! curl -fsSL -o "${ARCHIVE_NAME}.zip" "$URL"; then
            echo "❌ Failed to download"
            cd ..
            rm -rf "$TEMP_DIR"
            continue
          fi
          
          echo "Extracting..."
          unzip -q "${ARCHIVE_NAME}.zip"
          
          # 显示解压内容
          echo "Extracted files:"
          find . -type f | head -10
          
          # 查找 easytier 二进制文件
          EASYTIER_BIN=$(find . -name "easytier" -type f | head -n1)
          
          if [ -n "$EASYTIER_BIN" ]; then
            echo "Found: $EASYTIER_BIN"
            cd ..
            mkdir -p "$ARCH_DIR"
            cp "$TEMP_DIR/$EASYTIER_BIN" "$ARCH_DIR/easytier"
            chmod +x "$ARCH_DIR/easytier"
            echo "✅ Success: $ARCH_DIR/easytier"
            ls -la "$ARCH_DIR/"
          else
            echo "❌ easytier binary not found!"
            echo "Contents of temp dir:"
            ls -laR
            cd ..
          fi
          
          rm -rf "$TEMP_DIR"
        done
        
        # 显示最终目录结构
        echo ""
        echo "=== Final Build Directory Structure ==="
        ls -la
        for dir in x86_64 aarch64 armv7hf armhf riscv64; do
          if [ -d "$dir" ]; then
            echo ""
            echo "--- $dir ---"
            ls -la "$dir"
            file "$dir/easytier" 2>/dev/null || true
          else
            echo "❌ Directory $dir NOT FOUND!"
          fi
        done

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name != 'workflow_dispatch' }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ./build
        file: ./build/Dockerfile
        platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6' }}
        push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_to_registry != 'false' || github.event_name != 'workflow_dispatch') }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
