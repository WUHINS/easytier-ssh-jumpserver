name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.5.0 or latest)'
        required: false
        default: 'latest'
        type: string
      push_to_registry:
        description: 'Push to GitHub Container Registry'
        required: false
        default: true
        type: boolean
      platforms:
        description: 'Platforms to build (comma-separated)'
        required: false
        default: 'linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      if: github.event_name != 'pull_request' && inputs.push_to_registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Download EasyTier binaries
      run: |
        set -ex
        
        # 创建 build 目录
        rm -rf build
        mkdir -p build
        
        # 复制 Dockerfile 和 scripts 到 build 目录
        cp Dockerfile build/
        cp -r scripts/ build/scripts/
        
        # 获取最新版本号
        LATEST_RELEASE=$(curl -s https://api.github.com/repos/EasyTier/EasyTier/releases/latest | grep '"tag_name":' | head -1 | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')
        echo "=== Downloading EasyTier $LATEST_RELEASE ==="
        
        # 下载所有架构
        ARCHS="x86_64 aarch64 armv7hf armhf riscv64"
        
        for ARCH in $ARCHS; do
          echo ""
          echo "=== Processing $ARCH ==="
          
          # 创建架构目录
          mkdir -p "build/$ARCH"
          
          # 下载并解压到临时目录
          TEMP_DIR=$(mktemp -d)
          ARCHIVE_NAME="easytier-linux-${ARCH}-${LATEST_RELEASE}"
          URL="https://github.com/EasyTier/EasyTier/releases/download/$LATEST_RELEASE/${ARCHIVE_NAME}.zip"
          
          echo "Downloading: $URL"
          curl -fsSL -o "$TEMP_DIR/archive.zip" "$URL"
          
          echo "Extracting..."
          unzip -q "$TEMP_DIR/archive.zip" -d "$TEMP_DIR"
          
          # 显示内容
          echo "Extracted files:"
          find "$TEMP_DIR" -type f | head -10
          
          # 查找 easytier-core 并复制到 build 目录
          CORE_BIN=$(find "$TEMP_DIR" -name "easytier-core" -type f | head -n1)
          if [ -n "$CORE_BIN" ]; then
            echo "Found: $CORE_BIN"
            cp "$CORE_BIN" "build/$ARCH/easytier"
            chmod +x "build/$ARCH/easytier"
            echo "✅ Success: build/$ARCH/easytier"
            ls -la "build/$ARCH/"
          else
            echo "❌ easytier-core not found!"
            ls -laR "$TEMP_DIR"
            exit 1
          fi
          
          rm -rf "$TEMP_DIR"
        done
        
        # 显示最终目录结构
        echo ""
        echo "=== Final Build Directory Structure ==="
        ls -la build/
        for ARCH in $ARCHS; do
          if [ -d "build/$ARCH" ]; then
            echo ""
            echo "--- build/$ARCH ---"
            ls -la "build/$ARCH"
            file "build/$ARCH/easytier"
          fi
        done

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name != 'workflow_dispatch' }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ./build
        file: ./build/Dockerfile
        platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6' }}
        push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_to_registry != 'false' || github.event_name != 'workflow_dispatch') }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
